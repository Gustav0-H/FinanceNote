<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Gestão de Notas</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --sidebar-dark: #1a2a3a;
            --text-main: #333;
            --text-muted: #bdc3c7;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-yellow: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-dark);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { flex-grow: 1; padding: 20px 0; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 25px;
            text-decoration: none; color: var(--text-muted); transition: 0.3s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background-color: var(--accent-green); color: white; }

        /* --- CONTEÚDO --- */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 2rem; color: var(--sidebar-dark); margin: 0; }

        /* --- FILTRO UNIFICADO --- */
        .filters-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 30px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 20px;
            align-items: flex-end;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #555; }
        
        .form-input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-search {
            background-color: var(--sidebar-dark);
            color: white;
            border: none;
            padding: 11px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- TABELA E BOTÕES DE AÇÃO --- */
        .table-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f8f9fa; padding: 15px 20px; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
        
        .status-pending { color: var(--accent-yellow); font-weight: bold; font-style: italic; }
        .status-paid { color: var(--accent-green); font-weight: bold; }

        /* ESTILIZAÇÃO DOS BOTÕES */
        .action-container { display: flex; gap: 8px; align-items: center; }

        .btn-action {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-action:active { transform: scale(0.95); }

        .btn-pay { background-color: #e8f8f0; color: var(--accent-green); border: 1px solid var(--accent-green); }
        .btn-pay:hover { background-color: var(--accent-green); color: white; }

        .btn-edit { background-color: #ebf5fb; color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .btn-edit:hover { background-color: var(--accent-blue); color: white; }

        .btn-delete { background-color: #fdedec; color: var(--accent-red); border: 1px solid var(--accent-red); }
        .btn-delete:hover { background-color: var(--accent-red); color: white; }

        .check-icon {
            color: var(--accent-green);
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Finance<span>Note</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="pg2.html" class="nav-item">🏠 Menu Principal</a>
            <a href="cadastro.html" class="nav-item">📄 Cadastrar Notas</a>
            <a href="vencidas.html" class="nav-item">⚠️ Notas Vencidas</a>
            <a href="pesquisa.html" class="nav-item active">🔍 Pesquisar Notas</a>
            <a href="relatorios.html" class="nav-item">📊 Relatórios</a>
        </nav>
        <a href="index.html" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">🚪 Sair</a>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1>Pesquisa de Notas</h1>
        </header>

        <div class="filters-card">
            <div class="filter-row">
                <div class="form-group">
                    <label class="form-label">Fornecedor / Nota</label>
                    <input type="text" class="form-input" placeholder="Buscar por nome ou ID...">
                </div>
                <div class="form-group">
                    <label class="form-label">Dia de Início</label>
                    <input type="date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Dia de Fim</label>
                    <input type="date" class="form-input">
                </div>
                <div class="form-group">
                    <button class="btn-search">🔍 Buscar Notas</button>
                </div>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID / Nota</th>
                        <th>Fornecedor</th>
                        <th>Vencimento</th>
                        <th>Valor</th>
                        <th>Dia do Pagamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>NF-3001</strong></td>
                        <td>Papelaria Central</td>
                        <td>10/03/2026</td>
                        <td>R$ 450,00</td>
                        <td class="status-paid">08/03/2026</td>
                        <td>
                            <div class="action-container">
                                <span class="check-icon" title="Já Pago">✔</span>
                                <button class="btn-action btn-edit" title="Editar">✏️</button>
                                <button class="btn-action btn-delete" title="Excluir">🗑️</button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>NF-3005</strong></td>
                        <td>Limpeza & Cia</td>
                        <td>20/03/2026</td>
                        <td>R$ 1.200,00</td>
                        <td class="status-pending">Pendente</td>
                        <td>
                            <div class="action-container">
                                <button class="btn-action btn-pay">✅ Pagar</button>
                                <button class="btn-action btn-edit">✏️</button>
                                <button class="btn-action btn-delete">🗑️</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
