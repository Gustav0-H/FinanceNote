<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Cadastrar Notas</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --sidebar-dark: #1a2a3a;
            --text-main: #333;
            --text-muted: #bdc3c7;
            --accent-green: #2ecc71;
            --accent-blue: #cfe2f3;
            --accent-red: #f8d7da;
            --accent-yellow: #fff3cd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-dark);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { flex-grow: 1; padding: 20px 0; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 25px;
            text-decoration: none; color: var(--text-muted); transition: 0.3s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background-color: var(--accent-green); color: white; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        
        .page-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
        }

        .header-content h1 { font-size: 2rem; margin: 0; color: var(--sidebar-dark); }
        .page-description { color: #666; margin: 5px 0 0; }

        /* --- FORMULÁRIO DE CADASTRO --- */
        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group.full-width { grid-column: span 2; }

        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: #444; }
        
        .form-input, .form-select, .form-textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus, .form-select:focus { border-color: var(--accent-green); }

        .form-textarea { resize: vertical; min-height: 100px; }

        .btn-save {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover { background-color: #27ae60; transform: translateY(-2px); }

        /* --- STATUS BADGES --- */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-pending { background-color: var(--accent-yellow); color: #664d03; }
        .badge-paid { background-color: #d1e7dd; color: #0f5132; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Finance<span>Note</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="pg2.html" class="nav-item">🏠 Menu Principal</a>
            <a href="cadastro.html" class="nav-item active">📄 Cadastrar Notas</a>
            <a href="vencidas.html" class="nav-item">⚠️ Notas Vencidas</a>
            <a href="pesquisa.html" class="nav-item">🔍 Pesquisar Notas</a>
            <a href="relatorios.html" class="nav-item">📊 Relatórios</a>
        </nav>
        <a href="index.html" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">🚪 Sair</a>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="header-content">
                <h1>Nova Despesa</h1>
                <p class="page-description">Registre os detalhes da nota fiscal ou recibo</p>
            </div>
        </div>

        <div class="card">
            <form id="notaForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Número da Nota / ID</label>
                        <input type="text" class="form-input" placeholder="Ex: NF-2026-001" required>
                    </div>

                    <div class="form-group">
                        <label>Fornecedor / Empresa</label>
                        <input type="text" class="form-input" placeholder="Nome do fornecedor" required>
                    </div>

                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" class="form-input" placeholder="0,00" required>
                    </div>

                    <div class="form-group">
                        <label>Data de Vencimento</label>
                        <input type="date" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label>Categoria de Gasto</label>
                        <select class="form-select">
                            <option value="MATERIA_PRIMA">Matéria-prima</option>
                            <option value="LOGISTICA">Logística / Transporte</option>
                            <option value="INFRA">Infraestrutura</option>
                            <option value="SERVICOS">Serviços Terceirizados</option>
                            <option value="OUTROS">Outros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status do Pagamento</label>
                        <select class="form-select">
                            <option value="PENDENTE">Pendente</option>
                            <option value="PAGO">Pago</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Observações Adicionais</label>
                        <textarea class="form-textarea" placeholder="Detalhes extras sobre a nota..."></textarea>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn-save">
                        💾 Salvar Registro
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Exemplo de como os dados seriam tratados sem modificadores private
        class NotaDespesa {
            id;
            fornecedor;
            valor;
            vencimento;
            status;

            constructor(id, fornecedor, valor, vencimento, status) {
                this.id = id;
                this.fornecedor = fornecedor;
                this.valor = valor;
                this.vencimento = vencimento;
                this.status = status;
            }
        }

        document.getElementById('notaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Nota cadastrada com sucesso!');
        });
    </script>
</body>
</html>
