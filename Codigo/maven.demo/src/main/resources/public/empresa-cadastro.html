<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Cadastro de Empresa</title>
    <link rel="stylesheet" href="assets/css/geral.css">
    <link rel="stylesheet" href="assets/css/cadastro.css">
</head>

<body>
    <main class="registration-page">
        <div class="card registration-card">
            <div class="page-header">
                <h1>Cadastro de Empresa</h1>
                <p class="page-description">Crie sua empresa e defina a senha para cadastrar usuários no FinanceNote.</p>
            </div>

            <form id="companyForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="companyName">Nome da empresa / CNPJ / CPF</label>
                        <input type="text" id="companyName" name="companyName" class="form-input" placeholder="Nome da empresa ou CNPJ/CPF" required>
                    </div>

                    <div class="form-group">
                        <label for="companyEmail">E-mail de contato</label>
                        <input type="email" id="companyEmail" name="companyEmail" class="form-input" placeholder="contato@empresa.com" required>
                    </div>

                    <div class="form-group">
                        <label for="ownerName">Nome do dono / responsável</label>
                        <input type="text" id="ownerName" name="ownerName" class="form-input" placeholder="Nome do responsável" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="companyPassword">Senha de cadastro de usuários</label>
                        <input type="password" id="companyPassword" name="companyPassword" class="form-input" placeholder="Senha para cadastrar usuários" required>
                    </div>
                </div>

                <p class="note-text">Esta senha será usada ao cadastrar novos usuários dentro do sistema FinanceNote.</p>

                <div class="form-actions">
                    <a href="index.html" class="btn-cancel">Voltar para Login</a>
                    <button type="submit" class="btn-primary">Cadastrar Empresa</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('companyForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Empresa cadastrada com sucesso! Agora faça login com seus dados.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
