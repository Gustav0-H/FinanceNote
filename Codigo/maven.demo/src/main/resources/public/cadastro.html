<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Cadastrar Notas</title>
    <link rel="stylesheet" href="assets/css/cadastro.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Finance<span>Note</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="menu.html" class="nav-item">🏠 Menu Principal</a>
            <a href="inteligente.html" class="nav-item">🤖 Extração Inteligente</a>
            <a href="cadastro.html" class="nav-item active">📄 Cadastrar Notas</a>
            <a href="pesquisa.html" class="nav-item">🔍 Pesquisar Notas</a>
            <a href="vencidas.html" class="nav-item">⚠️ Notas Vencidas</a>
            <a href="vencimentos.html" class="nav-item">📅 Vencimentos do Dia</a>
            <a href="relatorios.html" class="nav-item">📊 Relatórios</a>
            <a href="perfil.html" class="nav-item">👤 Meu Perfil</a>            
        </nav>
        <a href="index.html" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">🚪 Sair</a>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="header-content">
                <h1>Nova Despesa</h1>
                <p class="page-description">Registre os detalhes da nota fiscal ou recibo</p>
            </div>
        </div>

        <div class="card">
            <form id="notaForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Número da Nota / ID</label>
                        <input type="text" class="form-input" placeholder="Ex: NF-2026-001" required>
                    </div>

                    <div class="form-group">
                        <label>Fornecedor / Empresa</label>
                        <input type="text" class="form-input" placeholder="Nome do fornecedor" required>
                    </div>

                    <div class="form-group">
                        <label>CNPJ/CPF do Fornecedor</label>
                        <input type="text" class="form-input" placeholder="Ex: 12.345.678/0001-90 ou 123.456.789-00" required>
                    </div>

                    <div class="form-group">
                        <label>CNPJ/CPF do Tomador</label>
                        <input type="text" class="form-input" placeholder="Ex: 12.345.678/0001-90 ou 123.456.789-00" required>
                    </div>

                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" class="form-input" placeholder="0,00" required>
                    </div>

                    <div class="form-group">
                        <label>Data de Vencimento</label>
                        <input type="date" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label>Status do Pagamento</label>
                        <select id="statusSelect" class="form-select">
                            <option value="PENDENTE">Pendente</option>
                            <option value="PAGO">Pago</option>
                        </select>
                    </div>

                    <!-- CAMPO QUE APARECE SOMENTE QUANDO ESTÁ PAGO -->
                    <div class="form-group" id="dataPagamentoGroup" style="display: none;">
                        <label>Data de Pagamento</label>
                        <input type="date" id="dataPagamento" class="form-input">
                    </div>

                    <div class="form-group full-width">
                        <label>Observações Adicionais</label>
                        <textarea class="form-textarea" placeholder="Detalhes extras sobre a nota..."></textarea>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn-save">
                        💾 Salvar Registro
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Controle dinâmico do campo Data de Pagamento
        const statusSelect = document.getElementById('statusSelect');
        const dataGroup = document.getElementById('dataPagamentoGroup');
        const dataInput = document.getElementById('dataPagamento');

        statusSelect.addEventListener('change', function () {
            if (this.value === 'PAGO') {
                dataGroup.style.display = 'block';
                dataInput.required = true;
            } else {
                dataGroup.style.display = 'none';
                dataInput.required = false;
                dataInput.value = ''; // limpa o campo
            }
        });

        // Formulário
        document.getElementById('notaForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Nota cadastrada com sucesso!');
        });
    </script>
</body>
</html>
