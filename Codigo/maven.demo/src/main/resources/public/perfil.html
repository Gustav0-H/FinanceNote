<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Meu Perfil</title>
    <link rel="stylesheet" href="assets/css/geral.css">
    <link rel="stylesheet" href="assets/css/perfil.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Finance<span>Note</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="menu.html" class="nav-item">🏠 Menu Principal</a>
            <a href="inteligente.html" class="nav-item">🤖 Extração Inteligente</a>
            <a href="cadastro.html" class="nav-item">📄 Cadastrar Notas</a>
            <a href="pesquisa.html" class="nav-item">🔍 Pesquisar Notas</a>
            <a href="vencidas.html" class="nav-item">⚠️ Notas Vencidas</a>
            <a href="vencimentos.html" class="nav-item">📅 Vencimentos do Dia</a>
            <a href="relatorios.html" class="nav-item">📊 Relatórios</a>
            <a href="perfil.html" class="nav-item active">👤 Meu Perfil</a>
        </nav>
        <a href="index.html" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">🚪 Sair</a>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>👤 Meu Perfil</h1>
            <p style="color:#666;">Gerencie suas informações pessoais</p>
        </div>

        <div class="profile-card">
            <form id="perfilForm">
                <div class="form-grid">

                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" class="form-input" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" class="form-input" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Empresa</label>
                        <input type="text" id="empresa" class="form-input" value="FinanceNote Ltda" readonly>
                        <small style="color:#999;">(Não é possível alterar a empresa)</small>
                    </div>

                </div>

                <div class="button-group">
                    <button type="button" onclick="toggleEditMode()" class="btn-edit" id="btnEditar">
                        ✏️ Editar Informações
                    </button>
                    <button type="submit" class="btn-save" id="btnSalvar" style="display: none;">
                        💾 Salvar Alterações
                    </button>
                </div>
            </form>

            <hr>

            <h3 style="margin: 30px 0 15px;">🔐 Trocar Senha</h3>
            <button onclick="mostrarFormularioSenha()" class="btn-primary">
                Alterar minha senha
            </button>

            <!-- Formulário de troca de senha -->
            <div id="formSenha" class="senha-container">
                <div class="form-group">
                    <label>Senha Atual</label>
                    <input type="password" id="senhaAtual" class="form-input" placeholder="Digite sua senha atual">
                </div>
                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" id="novaSenha" class="form-input" placeholder="Nova senha">
                </div>
                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="confirmarSenha" class="form-input" placeholder="Confirme a nova senha">
                </div>

                <div class="button-group">
                    <button onclick="trocarSenha()" class="btn-save">✅ Alterar Senha</button>
                    <button onclick="fecharFormularioSenha()" class="btn-cancel">Cancelar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let editMode = false;

        function toggleEditMode() {
            editMode = !editMode;
            const inputs = document.querySelectorAll('#perfilForm input:not(#empresa)');
            const btnEditar = document.getElementById('btnEditar');
            const btnSalvar = document.getElementById('btnSalvar');

            inputs.forEach(input => input.readOnly = !editMode);

            btnEditar.style.display = editMode ? 'none' : 'inline-block';
            btnSalvar.style.display = editMode ? 'inline-block' : 'none';
        }

        function mostrarFormularioSenha() {
            document.getElementById('formSenha').style.display = 'block';
        }

        function fecharFormularioSenha() {
            document.getElementById('formSenha').style.display = 'none';
            document.getElementById('senhaAtual').value = '';
            document.getElementById('novaSenha').value = '';
            document.getElementById('confirmarSenha').value = '';
        }

        function trocarSenha() {
            const atual = document.getElementById('senhaAtual').value;
            const nova = document.getElementById('novaSenha').value;
            const confirmar = document.getElementById('confirmarSenha').value;

            if (!atual || !nova || !confirmar) {
                alert('❌ Preencha todos os campos.');
                return;
            }
            if (nova !== confirmar) {
                alert('❌ As senhas não coincidem.');
                return;
            }
            alert('✅ Senha alterada com sucesso!');
            fecharFormularioSenha();
        }

        document.getElementById('perfilForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ Informações salvas com sucesso!');
            toggleEditMode();
        });
    </script>
</body>
</html>
