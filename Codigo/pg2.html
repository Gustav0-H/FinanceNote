<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceNote - Menu Principal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para o Menu Principal */
        .header-section {
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            width: 100%;
            padding: 60px 40px 50px;
            color: white;
            text-align: center;
            position: relative;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .header-content h1 {
            font-size: 3.2rem;
            margin: 0 0 12px 0;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .header-content h1 span {
            color: var(--accent-green);
        }

        .header-content p {
            font-size: 1.1rem;
            color: #bdc3c7;
            margin: 0;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .logout-link {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #bdc3c7;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .logout-link:hover {
            color: #e74c3c;
            transform: scale(1.08);
        }

        .logout-link svg {
            width: 34px;
            height: 34px;
            fill: currentColor;
            margin-bottom: 4px;
        }

        .logout-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .menu-container {
            padding: 60px 20px 40px;
            display: flex;
            justify-content: center;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
        }

        .feature-btn {
            background: white;
            padding: 45px 30px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            border: none;
            min-height: 220px;
        }

        .feature-btn:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .feature-icon {
            font-size: 4.2rem;
            margin-bottom: 20px;
            transition: transform 0.4s ease;
        }

        .feature-btn:hover .feature-icon {
            transform: scale(1.15);
        }

        /* Cores por botão */
        .btn-cadastro   { border-top: 6px solid #2ecc71; }
        .btn-vencidas   { border-top: 6px solid #e74c3c; }
        .btn-pesquisa   { border-top: 6px solid #3498db; }
        .btn-relatorios { border-top: 6px solid #f39c12; }

        @media (max-width: 768px) {
            .header-section {
                padding: 50px 20px 40px;
            }
            .header-content h1 {
                font-size: 2.4rem;
            }
            .features-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <h1>Finance<span>Note</span></h1>
            <p>Gestão inteligente de notas e despesas</p>
        </div>

        <a href="index.html" class="logout-link" title="Sair do Sistema">
            <svg viewBox="0 0 512 512">
                <path d="M160 96c17.7 0 32-14.3 32-32s-14.3-32-32-32H96C43 32 0 75 0 128V384c0 53 43 96 96 96h64c17.7 0 32-14.3 32-32s-14.3-32-32-32H96c-17.7 0-32-14.3-32-32V128c0-17.7 14.3-32 32-32h64zM502.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-128 128c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L402.7 288H192c-17.7 0-32-14.3-32-32s14.3-32 32-32h210.7l-73.4-73.4c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l128 128z"/>
            </svg>
            <span class="logout-label">Sair</span>
        </a>
    </header>

    <div class="menu-container">
        <div class="features-grid">
            
            <a href="cadastro.html" class="feature-btn btn-cadastro">
                <span class="feature-icon">📄</span>
                <span>Cadastrar Notas</span>
            </a>

            <a href="vencidas.html" class="feature-btn btn-vencidas">
                <span class="feature-icon">⚠️</span>
                <span>Notas Vencidas</span>
            </a>

            <a href="pesquisa.html" class="feature-btn btn-pesquisa">
                <span class="feature-icon">🔍</span>
                <span>Pesquisar Notas</span>
            </a>

            <a href="relatorios.html" class="feature-btn btn-relatorios">
                <span class="feature-icon">📊</span>
                <span>Relatórios Mensais</span>
            </a>

        </div>
    </div>

</body>
</html>
